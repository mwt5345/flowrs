name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Run tests
        run: cargo test --features ndarray --no-default-features
      - name: Clippy
        run: cargo clippy --features ndarray --no-default-features -- -D warnings
      - name: Format check
        run: cargo fmt --check
